    <!-- Inside lines / pipes -->
    <path d="M 32,54 L 32,33" stroke="#b23b3b" stroke-width="3"/>
    <path d="M 12,44 L 32,33" stroke="#b23b3b" stroke-width="3"/>
    <path d="M 52,44 L 32,33" stroke="#b23b3b" stroke-width="3"/>

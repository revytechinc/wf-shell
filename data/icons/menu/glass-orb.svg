<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- subtle dark/blue background to show off glass effect -->
  <rect width="64" height="64" rx="12" fill="#12121a" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- back glow -->
  <circle cx="32" cy="32" r="22" fill="url(#bglow)" opacity="0.6"/>
  <!-- glass body -->
  <circle cx="32" cy="32" r="18" fill="url(#gbody)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- gloss highlight -->
  <ellipse cx="32" cy="22" rx="10" ry="6" fill="url(#ghigh)"/>
  <defs>
    <radialGradient id="bglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <linearGradient id="ghigh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#020804"/>
  <!-- Holographic HUD crosshairs and reticles -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="#1a8f2a" stroke-width="0.75" stroke-dasharray="6,6" opacity="0.5"/>
  <line x1="32" y1="4" x2="32" y2="60" stroke="#1a8f2a" stroke-width="0.75" stroke-dasharray="6,6" opacity="0.5"/>
  <circle cx="32" cy="32" r="28" fill="none" stroke="#1a8f2a" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#1a8f2a" stroke-width="0.75" stroke-dasharray="2,8" opacity="0.4"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#00e5a8" stroke-width="0.75" opacity="0.5"/>

  <!-- Outer Isometric Cube -->
  <polygon points="32,6 56,18 56,46 32,58 8,46 8,18" fill="none" stroke="#39ff14" stroke-width="2"/>
  <line x1="32" y1="32" x2="32" y2="58" stroke="#39ff14" stroke-width="2"/>
  <line x1="32" y1="32" x2="8" y2="18" stroke="#39ff14" stroke-width="2"/>
  <line x1="32" y1="32" x2="56" y2="18" stroke="#39ff14" stroke-width="2"/>

  <!-- Inner Cyan Dash-pattern Cube -->
  <polygon points="32,18 45,24 45,40 32,46 19,40 19,24" fill="none" stroke="#00e5a8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="32" y1="32" x2="32" y2="46" stroke="#00e5a8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="32" y1="32" x2="19" y2="24" stroke="#00e5a8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="32" y1="32" x2="45" y2="24" stroke="#00e5a8" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Glowing green/cyan nodes -->
  <circle cx="32" cy="6" r="3" fill="#39ff14"/>
  <circle cx="56" cy="18" r="3" fill="#39ff14"/>
  <circle cx="56" cy="46" r="3" fill="#39ff14"/>
  <circle cx="32" cy="58" r="3" fill="#39ff14"/>
  <circle cx="8" cy="46" r="3" fill="#39ff14"/>
  <circle cx="8" cy="18" r="3" fill="#39ff14"/>
  <circle cx="32" cy="32" r="3.5" fill="#00e5a8" stroke="#39ff14" stroke-width="1"/>
</svg>

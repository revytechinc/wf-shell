<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="aqua-glow" cx="50%" cy="40%" r="50%" fx="30%" fy="20%">
      <stop offset="0%" stop-color="#80c0ff" />
      <stop offset="70%" stop-color="#0066cc" />
      <stop offset="100%" stop-color="#003380" />
    </radialGradient>
    <linearGradient id="aqua-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>
  <!-- Aqua Glass Sphere -->
  <circle cx="32" cy="32" r="26" fill="url(#aqua-glow)" stroke="#003380" stroke-width="1.5"/>
  <!-- Top Glass Reflection / Shine -->
  <ellipse cx="32" cy="20" rx="18" ry="10" fill="url(#aqua-shine)"/>
  <!-- Bottom soft glow -->
  <ellipse cx="32" cy="46" rx="14" ry="6" fill="#80c0ff" opacity="0.3"/>
</svg>

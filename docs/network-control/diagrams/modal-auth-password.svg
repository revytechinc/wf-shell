<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="100%" preserveAspectRatio="xMidYMid meet">
  <foreignObject x="0" y="0" width="360" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="position:relative;width:360px;height:300px;box-sizing:border-box;font-family:system-ui,Sans,sans-serif;background:#0c0c14;color:#cdd6f4;padding:16px;">
      <div style="font-size:11px;color:#a6adc8;margin-bottom:10px;">doas/sudo present but password required — not information-only</div>
      <div style="background:#1e1e2e;border:1px solid #45475a;border-radius:12px;overflow:hidden;max-width:320px;">
        <div style="padding:10px 12px;border-bottom:1px solid #313244;font-size:13px;font-weight:600;">Authentication required</div>
        <div style="padding:12px;display:flex;flex-direction:column;gap:10px;font-size:12px;">
          <div style="color:#a6adc8;line-height:1.4;">Administrator access is required to change network settings.</div>
          <div>
            <div style="font-size:10px;color:#6c7086;text-transform:uppercase;margin-bottom:4px;">Password</div>
            <div style="background:#313244;border:1px solid #45475a;border-radius:6px;padding:8px;letter-spacing:2px;">••••••••</div>
          </div>
        </div>
        <div style="padding:10px 12px;border-top:1px solid #313244;display:flex;justify-content:flex-end;gap:8px;">
          <span style="border:1px solid #45475a;border-radius:6px;padding:6px 10px;font-size:11px;color:#a6adc8;">Cancel</span>
          <span style="border:1px solid #89b4fa;border-radius:6px;padding:6px 10px;font-size:11px;background:#313a55;color:#89b4fa;">Authenticate</span>
        </div>
      </div>
      <div style="margin-top:12px;font-size:10px;color:#6c7086;line-height:1.45;">
        Shown on Save / Create / Turn on|off / Delete when needs_password.<br/>
        No elevator at all → information-only (no dialog).
      </div>
    </div>
  </foreignObject>
</svg>

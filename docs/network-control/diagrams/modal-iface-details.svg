<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" width="100%" preserveAspectRatio="xMidYMid meet">
  <foreignObject x="0" y="0" width="440" height="480">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:440px;height:480px;box-sizing:border-box;font-family:system-ui,sans-serif;background:#0c0c14;color:#cdd6f4;padding:14px;">
      <div style="font-size:11px;color:#a6adc8;margin-bottom:8px;">Right-click → Details… — full iface + traffic histogram</div>
      <div style="background:#1e1e2e;border:1px solid #45475a;border-radius:12px;overflow:hidden;max-width:400px;">
        <div style="padding:10px 12px;border-bottom:1px solid #313244;font-size:13px;font-weight:600;">aq0</div>
        <div style="padding:12px;font-size:12px;">
          <div style="display:grid;grid-template-columns:100px 1fr;gap:5px 8px;margin-bottom:12px;">
            <div style="color:#6c7086;font-size:10px;">STATE</div><div style="color:#a6e3a1;">Up · running</div>
            <div style="color:#6c7086;font-size:10px;">SPEED</div><div>10 Gbps</div>
            <div style="color:#6c7086;font-size:10px;">MEDIA</div><div style="color:#a6adc8;font-size:11px;">10Gbase-T full-duplex</div>
            <div style="color:#6c7086;font-size:10px;">IPv4</div><div>99.48.162.238</div>
            <div style="color:#6c7086;font-size:10px;">IPv6</div><div style="font-size:11px;">2600:1700:…</div>
            <div style="color:#6c7086;font-size:10px;">MAC</div><div style="font-size:11px;">2c:f0:5d:8b:0e:3c</div>
          </div>
          <div style="font-size:10px;color:#6c7086;text-transform:uppercase;margin-bottom:4px;">Traffic</div>
          <div style="font-size:11px;color:#a6adc8;margin-bottom:6px;font-variant-numeric:tabular-nums;">
            RX 1.2 Gbps · TX 340 Mbps<br/>Total RX 36.6 GB · TX 3.0 GB
          </div>
          <div style="background:#181825;border:1px solid #45475a;border-radius:8px;padding:10px 8px;height:90px;position:relative;">
            <!-- line graph mock (wave-fill) -->
            <svg viewBox="0 0 200 70" width="100%" height="70" preserveAspectRatio="none">
              <polyline fill="rgba(137,180,250,0.3)" stroke="#89b4fa" stroke-width="1.5"
                points="0,50 20,40 40,45 60,25 80,35 100,15 120,28 140,20 160,32 180,18 200,30 200,70 0,70"/>
              <polyline fill="none" stroke="#a6e3a1" stroke-width="1.5"
                points="0,55 20,50 40,52 60,42 80,48 100,38 120,44 140,36 160,40 180,34 200,38"/>
            </svg>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:12px;font-size:10px;color:#6c7086;margin-top:4px;">
            <span style="color:#89b4fa;">— Receive</span><span style="color:#a6e3a1;">— Transmit</span>
            <span>· wave-fill</span>
          </div>
        </div>
        <div style="padding:10px 12px;border-top:1px solid #313244;display:flex;justify-content:flex-end;">
          <span style="border:1px solid #45475a;border-radius:6px;padding:6px 10px;font-size:11px;color:#a6adc8;">Close</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>

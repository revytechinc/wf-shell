<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="100%" preserveAspectRatio="xMidYMid meet">
  <foreignObject x="0" y="0" width="520" height="420">
    <div xmlns="http://www.w3.org/1999/xhtml" style="position:relative;width:520px;height:420px;box-sizing:border-box;font-family:system-ui,Sans,sans-serif;background:#11111b;color:#cdd6f4;padding:12px;">
      <div style="font-size:11px;color:#a6adc8;margin-bottom:10px;">Right-click interface — state-aware actions (can_admin)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <!-- destroyable clone, currently up -->
        <div style="position:relative;background:#1e1e2e;border:1px solid #45475a;border-radius:12px;padding:8px 0 0;min-height:200px;">
          <div style="padding:0 10px 6px;font-size:9px;color:#6c7086;text-transform:uppercase;">tap0 · virtual · up</div>
          <div style="margin:0 10px 8px;padding:8px;border-radius:8px;border:1px solid #89b4fa;background:#1a2030;">
            <strong style="font-size:12px;">tap0</strong>
            <span style="font-size:9px;margin-left:4px;padding:1px 5px;border-radius:4px;background:#313244;color:#89b4fa;">VIRTUAL</span>
            <div style="font-size:10px;color:#a6adc8;margin-top:2px;">Running</div>
          </div>
          <div style="margin:0 10px;min-width:160px;background:#181825;border:1px solid #45475a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.45);padding:4px;font-size:12px;">
            <div style="padding:8px 10px;border-radius:6px;background:#313244;">Turn off</div>
            <div style="padding:8px 10px;border-radius:6px;">Configure…</div>
            <div style="height:1px;background:#313244;margin:4px 2px;"></div>
            <div style="padding:8px 10px;border-radius:6px;color:#f38ba8;">Delete interface…</div>
          </div>
        </div>
        <!-- permanent NIC, currently down -->
        <div style="position:relative;background:#1e1e2e;border:1px solid #45475a;border-radius:12px;padding:8px 0 0;min-height:200px;">
          <div style="padding:0 10px 6px;font-size:9px;color:#6c7086;text-transform:uppercase;">igb0 · permanent · down</div>
          <div style="margin:0 10px 8px;padding:8px;border-radius:8px;border:1px solid #45475a;background:#1a1a24;">
            <strong style="font-size:12px;">igb0</strong>
            <span style="font-size:9px;margin-left:4px;padding:1px 5px;border-radius:4px;background:#3a2a30;color:#f38ba8;">Down</span>
            <div style="font-size:10px;color:#a6adc8;margin-top:2px;">1000baseT</div>
          </div>
          <div style="margin:0 10px;min-width:160px;background:#181825;border:1px solid #45475a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.45);padding:4px;font-size:12px;">
            <div style="padding:8px 10px;border-radius:6px;background:#313244;">Turn on</div>
            <div style="padding:8px 10px;border-radius:6px;">Configure…</div>
            <div style="height:1px;background:#313244;margin:4px 2px;"></div>
            <div style="padding:8px 10px;border-radius:6px;color:#585b70;">Delete interface…</div>
          </div>
        </div>
      </div>
      <div style="margin-top:14px;font-size:10px;color:#6c7086;line-height:1.55;">
        <div><span style="color:#cdd6f4;">Turn on / Turn off</span> — label from live interface state</div>
        <div><span style="color:#cdd6f4;">Delete</span> — only for destroyable clones; permanent NICs stay disabled</div>
        <div><span style="color:#cdd6f4;">Create…</span> — only lists types that pass preflight (no command banners)</div>
        <div><span style="color:#cdd6f4;">information-only</span> — mutations disabled if no admin</div>
      </div>
    </div>
  </foreignObject>
</svg>
